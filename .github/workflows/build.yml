name: FreqTalk Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate Boilerplate
        run: |
          cp pubspec.yaml pubspec.yaml.bak
          flutter create --platforms=android .
          mv -f pubspec.yaml.bak pubspec.yaml
      - name: Patch Android SDK
        run: |
          # Patch namespace for the project if missing
          echo "android.namespace=com.example.freqtalk" >> android/gradle.properties
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle || true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: freqtalk-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate Boilerplate
        run: |
          copy-item pubspec.yaml pubspec.yaml.bak -force
          flutter create --platforms=windows .
          move-item pubspec.yaml.bak pubspec.yaml -force
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: freqtalk-windows-exe
          path: build/windows/runner/Release/
